version: 1
frontend:
  phases:
    preBuild:
      commands:
        - git clone https://github.com/flutter/flutter.git -b stable
        - export PATH="$PATH:`pwd`/flutter/bin"
        - flutter doctor
        - flutter pub get
    build:
      commands:
        - flutter build web --release --dart-define=FLUTTER_WEB_USE_SKIA=false --no-wasm-dry-run
  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'
  cache:
    paths:
      - ~/.pub-cache
      - flutter/**/*
      - .dart_tool/**/*
