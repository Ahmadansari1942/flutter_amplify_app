version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Download Flutter (Linux)
        - curl -L https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.19.0-stable.tar.xz -o flutter.tar.xz
        
        # Extract
        - tar -xf flutter.tar.xz

        # Set PATH
        - export PATH="$PATH:`pwd`/flutter/bin"

        # Enable web
        - flutter config --enable-web

        # Install deps
        - flutter pub get

    build:
      commands:
        # Build web
        - flutter build web

  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'

  cache:
    paths:
      - flutter/**
      - .pub-cache/**/*
