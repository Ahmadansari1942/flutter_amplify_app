version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g flutter
        - flutter config --enable-web
        - flutter pub get
    build:
      commands:
        - flutter build web
  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'
  cache:
    paths:
      - .pub-cache/**/*
